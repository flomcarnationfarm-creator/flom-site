<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FloM carnations</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="hero">
    <div class="hero-bg">
      <picture class="bg-picture active">
        <source media="(max-width: 768px) and (orientation: portrait)" srcset="flom-sp1.jpg">
        <img src="flom1.jpg" alt="" class="bg-slide">
      </picture>

      <picture class="bg-picture">
        <source media="(max-width: 768px) and (orientation: portrait)" srcset="flom-sp2.jpg">
        <img src="flom2.jpg" alt="" class="bg-slide">
      </picture>

      <picture class="bg-picture">
        <source media="(max-width: 768px) and (orientation: portrait)" srcset="flom-sp3.jpg">
        <img src="flom3.jpg" alt="" class="bg-slide">
      </picture>

      <picture class="bg-picture">
        <source media="(max-width: 768px) and (orientation: portrait)" srcset="flom-sp4.jpg">
        <img src="flom4.jpg" alt="" class="bg-slide">
      </picture>

      <picture class="bg-picture">
        <source media="(max-width: 768px) and (orientation: portrait)" srcset="flom-sp5.jpg">
        <img src="flom5.jpg" alt="" class="bg-slide">
      </picture>
    </div>

    <div class="hero-overlay"></div>

    <div class="hero-inner">
      <header class="site-header">
        <div class="logo">
          <div class="logo-main">FloM</div>
          <div class="logo-sub">CARNATION</div>
        </div>

        <div class="menu-wrap">
          <span class="menu-text">MENU</span>
          <button class="menu-button" aria-label="menu">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </header>

      <section class="hero-copy">
        <h1>
          Grown with<br>
          intention.<br>
          Designed by<br>
          nature.
        </h1>

        <p class="jp-copy">
          ただ作るのではなく、<br>
          環境・水・湿度を設計する。<br>
          FloMは“完成度”で咲う。
        </p>
      </section>

      <section class="first-bloom">
        <div class="eyebrow">FIRST BLOOM</div>
        <h2 id="flower-name-en">Sakura Minami</h2>
        <div class="jp-name" id="flower-name-jp">サクラ ミナミ</div>

        <p class="bloom-copy" id="flower-copy">
          やわらかな桜色に、繊細な絞りの入る品種。<br>
          静けさの中に、芯の強さがある。
        </p>

        <a href="#" class="details-link">VIEW DETAILS <span>→</span></a>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
