<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FloM carnations</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="hero">

    <!-- 背景スライド -->
    <div class="hero-bg">
      <img src="flom1.jpg" alt="" class="bg-slide active">
      <img src="flom2.jpg" alt="" class="bg-slide">
      <img src="flom3.jpg" alt="" class="bg-slide">
      <img src="flom4.jpg" alt="" class="bg-slide">
      <img src="flom5.jpg" alt="" class="bg-slide">
    </div>

    <!-- オーバーレイ -->
    <div class="hero-overlay"></div>

    <!-- ヘッダー -->
    <header class="site-header">
      <div class="logo">
        <div class="logo-main">FloM</div>
        <div class="logo-sub">CARNATION</div>
      </div>

      <div class="menu-wrap">
        <span class="menu-text">MENU</span>
        <button class="menu-button" aria-label="menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>

    <!-- コピー -->
    <section class="hero-copy">
      <h1>
        Grown with intention.<br>
        Designed by nature.
      </h1>

      <p class="jp-copy">
        ただ作るのではなく、<br>
        環境・水・湿度を設計する。<br>
        FloMは“完成度”で咲う。
      </p>
    </section>

    <!-- スクロール -->
    <div class="scroll-mark">
      <div class="scroll-line"></div>
      <div class="scroll-text">SCROLL</div>
      <div class="scroll-arrow">↓</div>
    </div>

    <!-- 品種情報 -->
    <section class="first-bloom">
      <div class="eyebrow">FIRST BLOOM</div>
      <h2 id="flower-name-en">Sakura Minami</h2>
      <div class="jp-name" id="flower-name-jp">サクラ ミナミ</div>

      <p class="bloom-copy" id="flower-copy">
        やわらかな桜色に、繊細な絞りの入る品種。<br>
        静けさの中に、芯の強さがある。
      </p>

      <a href="#" class="details-link">VIEW DETAILS <span>→</span></a>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
